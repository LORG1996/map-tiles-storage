<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mapbox Safari Test1</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { 
            position: absolute; 
            top: 0; 
            bottom: 0; 
            width: 100%; 
            /* Фікс для Safari: примусова висота та шар */
            height: 100vh !important;
            background-color: #f0f0f0; /* Якщо карта не грузиться, буде сірий фон */
        }

        /* Примусовий вивід canvas для Safari */
        canvas.mapboxgl-canvas {
            display: block !important;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // ТИМЧАСОВИЙ ТОКЕН ДЛЯ ТЕСТУ (можеш замінити на свій)
    // Якщо цей не працює, візьми свій з кабінету Mapbox
    mapboxgl.accessToken = 'pk.eyJ1IjoibWFrYXNpbjEyMyIsImEiOiJja3U4Y2NwMDEyMWJxMm9vNmpnaTNpM2xpIn0.SS9Vn71SdafbTU_0M9zJEg';

    try {
        const map = new mapboxgl.Map({
            container: 'map',
            // Використовуємо стандартний стиль онлайн, щоб виключити помилки в offlineStyle.json
            style: 'mapbox://styles/mapbox/streets-v11',
            center: [26.3, 51.4], // Антонівка/Бережниця
            zoom: 12,
            // ФІКС ДЛЯ SAFARI: тримаємо картинку в буфері
            preserveDrawingBuffer: true,
            antialias: true
        });

        map.on('load', () => {
            console.log('Карта успішно завантажена!');
        });

        map.on('error', (e) => {
            console.error('Помилка Mapbox:', e.error);
        });

    } catch (err) {
        console.error('Критична помилка ініціалізації:', err);
    }
</script>

</body>
</html>
